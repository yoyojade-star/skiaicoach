[pytest]
pythonpath = .
# Coverage (requires pytest-cov): pytest -q --cov=. --cov-config=.coveragerc --cov-report=term-missing
filterwarnings =
    # langchain_core pydantic v1 shims vs Python 3.14+ (upstream); safe to ignore in tests
    ignore:Core Pydantic V1 functionality isn't compatible with Python:UserWarning
